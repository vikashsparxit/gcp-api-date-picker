<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: Arial, sans-serif; width: 350px; padding: 15px; background: #fff; }
    .container { margin: 10px 0; }
    label { display: block; font-weight: bold; margin: 10px 0 5px 0; color: #1f2937; }
    input[type="date"] { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; margin-top: 15px; background: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button:hover { background: #357ae8; }
    .info { font-size: 12px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>GCP Date Picker</h2>
  <div class="container">
    <label for="startDate">Start Date:</label>
    <input type="date" id="startDate" />
  </div>
  <div class="container">
    <label for="endDate">End Date:</label>
    <input type="date" id="endDate" />
  </div>
  <button id="applyBtn">Apply Date Range</button>
  <div id="totalRequestsSection" class="total-section" style="margin-top: 12px; padding: 10px; background: #f0f7ff; border-radius: 6px; border: 1px solid #4285f4;">
    <div id="totalRequestsLabel" style="font-size: 12px; color: #666; margin-bottom: 4px;">Total requests (this period)</div>
    <div id="totalRequestsValue" style="font-size: 18px; font-weight: bold; color: #1a73e8;">—</div>
  </div>
  <div class="info">Navigate to GCP APIs Dashboard first, then use this extension.</div>
  <script src="popup.js"></script>
</body>
</html>
